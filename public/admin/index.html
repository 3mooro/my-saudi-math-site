<!doctype html>
<html lang="ar" dir="rtl" translate="no">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="robots" content="noindex" />
		<meta name="google" content="notranslate" />
		<title>لوحة إدارة أكاديمية KSA</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
		<style>
			body { font-family: 'Cairo', sans-serif !important; background-color: #f1f5f9 !important; margin: 0; padding: 0; }
			#nc-root [class^="nc-app-header-container"] { background: linear-gradient(135deg, #3b82f6, #8b5cf6) !important; }
			button[class^="nc-login-page-button"] {
				background: linear-gradient(135deg, #3b82f6, #8b5cf6) !important;
				color: white !important;
				border-radius: 50px !important;
				padding: 16px 40px !important;
				font-weight: 900 !important;
				border: none !important;
				cursor: pointer;
			}
			span[class^="nc-login-page-logo"] { display: none !important; }
			section[class^="nc-login-page-main-view"]::before {
				content: "لوحة إدارة أكاديمية KSA";
				display: block; font-size: 2.5rem; font-weight: 900; color: #1e293b; margin-bottom: 1rem; text-align: center;
			}
		</style>
	</head>
	<body>
		<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
		<script>
			// إعداد اللوحة بشكل يدوي كامل لمنع تضارب الملفات ولضمان العمل على أي رابط
			window.CMS.init({
				config: {
					backend: {
						name: "github",
						repo: "3mooro/my-saudi-math-site",
						branch: "main",
						base_url: window.location.origin,
						auth_endpoint: "api/auth"
					},
					display_name: "أكاديمية KSA",
					locale: 'ar',
					media_folder: "src/assets",
					public_folder: "../../assets",
					collections: [
						{
							name: "blog",
							label: "المقالات",
							folder: "src/content/blog",
							create: true,
							fields: [
								{ label: "العنوان", name: "title", widget: "string" },
								{ label: "الوصف", name: "description", widget: "text" },
								{ label: "التاريخ", name: "pubDate", widget: "datetime" },
								{ label: "صورة الغلاف", name: "heroImage", widget: "image" },
								{ label: "الكاتب", name: "author", widget: "string", default: "أكاديمية KSA" },
								{ label: "المحتوى", name: "body", widget: "markdown" }
							]
						},
						{
							name: "courses",
							label: "الكورسات",
							folder: "src/content/courses",
							extension: "json",
							format: "json",
							create: true,
							fields: [
								{ label: "اسم المادة", name: "title", widget: "string" },
								{ label: "المرحلة", name: "level", widget: "select", options: ["primary", "middle", "secondary", "university"] },
								{ label: "اسم المدرس", name: "instructor", widget: "string" },
								{ label: "التقييم", name: "rating", widget: "number", value_type: "float" },
								{ label: "رابط الصورة", name: "image", widget: "string" },
								{ label: "التصنيف", name: "tag", widget: "string" },
								{ label: "الترتيب", name: "order", widget: "number" },
								{ label: "الباقات", name: "packages", widget: "list", fields: [
									{label: "الاسم", name: "name", widget: "string"},
									{label: "السعر الإجمالي", name: "totalPrice", widget: "number"}
								]},
								{ label: "المنهج", name: "syllabus", widget: "list", fields: [
									{label: "الوحدة", name: "unit", widget: "string"},
									{label: "الدروس", name: "lessons", widget: "list"}
								]},
								{ label: "وصف تفصيلي", name: "body", widget: "markdown", required: false }
							]
						},
						{
							name: "settings",
							label: "إعدادات الموقع",
							files: [
								{
									name: "general",
									label: "الإعدادات العامة",
									file: "src/content/settings/general.json",
									fields: [
										{ label: "اسم الموقع", name: "siteTitle", widget: "string" },
										{ label: "وصف الموقع", name: "siteDescription", widget: "text" },
										{ label: "رقم الواتساب", name: "whatsappNumber", widget: "string" }
									]
								}
							]
						}
					]
				}
			});
		</script>
	</body>
</html>
