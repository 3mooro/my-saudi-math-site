<!doctype html>
<html lang="ar" dir="rtl">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="robots" content="noindex" />
		<title>لوحة إدارة أكاديمية KSA</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
		<style>
			/* التصميم البريميوم المخصص */
			body { font-family: 'Cairo', sans-serif !important; background-color: #f1f5f9 !important; }
			div[class^="nc-app-header-container"] { background: linear-gradient(135deg, #3b82f6, #8b5cf6) !important; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3) !important; }
			button[class^="nc-login-page-button"] {
				background: linear-gradient(135deg, #3b82f6, #8b5cf6) !important;
				color: white !important;
				border-radius: 50px !important;
				padding: 16px 40px !important;
				font-weight: 900 !important;
				font-size: 1.2rem !important;
				box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4) !important;
				border: none !important;
				cursor: pointer;
			}
			span[class^="nc-login-page-logo"] { display: none !important; }
			section[class^="nc-login-page-main-view"]::before {
				content: "لوحة إدارة أكاديمية KSA";
				display: block; font-size: 2.5rem; font-weight: 900; color: #1e293b; margin-bottom: 1rem; text-align: center;
			}
			section[class^="nc-login-page-main-view"]::after {
				content: "تحكم في مقالاتك وكورساتك بضغطة زر";
				display: block; font-size: 1.1rem; font-weight: 700; color: #64748b; margin-bottom: 2rem; text-align: center;
			}
		</style>
	</head>
	<body>
		<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
		<script>
			// إعداد اللوحة برمجياً لضمان العمل على أي رابط (Dynamic Base URL)
			window.CMS.init({
				config: {
					backend: {
						name: "github",
						repo: "3mooro/my-saudi-math-site",
						branch: "main",
						base_url: window.location.origin,
						auth_endpoint: "api/auth"
					},
					site_url: window.location.origin,
					display_name: "أكاديمية KSA",
					media_folder: "src/assets",
					public_folder: "../../assets",
					collections: [
						{
							name: "blog",
							label: "المقالات",
							folder: "src/content/blog",
							create: true,
							fields: [
								{ label: "العنوان", name: "title", widget: "string" },
								{ label: "الوصف", name: "description", widget: "text" },
								{ label: "التاريخ", name: "pubDate", widget: "datetime" },
								{ label: "الصورة", name: "heroImage", widget: "image" },
								{ label: "الكاتب", name: "author", widget: "string" },
								{ label: "المحتوى", name: "body", widget: "markdown" }
							]
						},
						{
							name: "courses",
							label: "الكورسات",
							folder: "src/content/courses",
							extension: "json",
							format: "json",
							create: true,
							fields: [
								{ label: "اسم المادة", name: "title", widget: "string" },
								{ label: "المرحلة", name: "level", widget: "select", options: ["primary", "middle", "secondary"] },
								{ label: "السعر الإجمالي", name: "price", widget: "string" },
								{ label: "الباقات", name: "packages", widget: "list", fields: [
									{label: "الاسم", name: "name", widget: "string"},
									{label: "السعر", name: "totalPrice", widget: "number"}
								]}
							]
						}
					]
				}
			});
		</script>
	</body>
</html>
