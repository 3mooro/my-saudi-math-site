<!doctype html>
<html lang="ar" dir="rtl">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="robots" content="noindex" />
		<title>لوحة إدارة أكاديمية KSA</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
		<style>
			/* تخصيص مظهر صفحة الدخول بالكامل */
			body {
				font-family: 'Cairo', sans-serif !important;
				background-color: #f8fafc !important;
			}
			/* تغيير لون الهيدر */
			div[class^="nc-app-header-container"] {
				background-color: #3b82f6 !important;
				box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1) !important;
			}
			/* تخصيص زر الدخول */
			button[class^="nc-login-page-button"] {
				background-color: #3b82f6 !important;
				color: white !important;
				border-radius: 9999px !important;
				padding: 12px 32px !important;
				font-weight: 900 !important;
				font-size: 1.1rem !important;
				transition: all 0.3s !important;
				box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3) !important;
			}
			button[class^="nc-login-page-button"]:hover {
				transform: scale(1.05) !important;
				background-color: #2563eb !important;
			}
			/* إخفاء لوجو Decap ووضع نص مخصص أو شعار الموقع */
			span[class^="nc-login-page-logo"] {
				display: none !important;
			}
			section[class^="nc-login-page-main-view"]::before {
				content: "لوحة إدارة أكاديمية KSA";
				display: block;
				font-size: 2rem;
				font-weight: 900;
				color: #1e293b;
				margin-bottom: 2rem;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<!-- Include the script that builds the page and powers Decap CMS -->
		<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
	</body>
</html>
